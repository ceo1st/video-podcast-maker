name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # ffmpeg/ffprobe are mocked in tests, but keep the binary available for
      # any test that shells out to probe real fixtures.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install pytest
      - run: pytest -q
